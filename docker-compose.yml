services:
  # ----------------------------------------
  # MESSAGE BROKER
  # ----------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ecommerce_rabbitmq
    ports:
      - "5672:5672"   # Porta padrão de comunicação do RabbitMQ
      - "15672:15672" # Interface visual de administração (Dashboard)
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password

  # ----------------------------------------
  # BANCOS DE DADOS (POSTGRESQL)
  # ----------------------------------------
  
  # Banco do Serviço de Usuários
  users_db:
    image: postgres:15-alpine
    container_name: ecommerce_users_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: users_db
    ports:
      - "5431:5432"

  # Banco do Serviço de Produtos - Réplica 1
  products_db_1:
    image: postgres:15-alpine
    container_name: ecommerce_products_db_1
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: products_db_1
    ports:
      - "5433:5432"

  # Banco do Serviço de Produtos - Réplica 2
  products_db_2:
    image: postgres:15-alpine
    container_name: ecommerce_products_db_2
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: products_db_2
    ports:
      - "5434:5432"

  # Banco do Serviço de Pedidos
  orders_db:
    image: postgres:15-alpine
    container_name: ecommerce_orders_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: orders_db
    ports:
      - "5435:5432"